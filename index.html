<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aulac Big Stop">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e0e11">
<title>Aulac Big Stop Table Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
<style>
:root {
  --bg:#0e0e11; --surf:#16161a; --surf2:#1e1e24;
  --border:rgba(255,255,255,0.08); --text:#eee; --dim:rgba(255,255,255,0.38);
  --accent:#FFD700;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{height:100%;overflow:hidden;font-family:'IBM Plex Mono','Courier New',monospace;background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;height:100vh;height:100dvh;-webkit-user-select:none;user-select:none;}

/* HEADER */
#hdr{height:48px;min-height:48px;flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:10px;}
#logo{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px;white-space:nowrap;}
.vdiv{width:1px;height:20px;background:var(--border);}
.hctl{display:flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:4px 8px;}
.hctl label{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
.srv-adj-btn{width:34px;height:34px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);
  color:#fff;font-size:20px;font-weight:700;cursor:pointer;line-height:1;padding:0;font-family:'IBM Plex Mono',monospace;}
.srv-adj-btn:active{background:rgba(255,255,255,0.18);}
#srv-count{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:#fff;min-width:22px;text-align:center;}
#btn-logout{padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;}
#btn-logout:active{background:rgba(255,255,255,0.12);}
#btn-clr{padding:6px 10px;border-radius:7px;border:1px solid rgba(255,80,80,0.3);background:rgba(255,80,80,0.07);color:#ff6060;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;}
#btn-clr:active{background:rgba(255,80,80,0.2);}
#btn-reset-pos{margin-left:auto;padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;}
#btn-reset-pos:active{background:rgba(255,255,255,0.12);}
#btn-undo{padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;transition:background .15s,color .15s,border-color .15s;}
#btn-undo:not(:disabled){background:rgba(255,215,0,0.12);color:var(--accent);border-color:rgba(255,215,0,0.35);}
#btn-undo:not(:disabled):active{background:rgba(255,215,0,0.25);}
#btn-undo:disabled{opacity:0.3;cursor:default;}
#btn-redo{padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;transition:background .15s,color .15s,border-color .15s;}
#btn-redo:not(:disabled){background:rgba(255,215,0,0.12);color:var(--accent);border-color:rgba(255,215,0,0.35);}
#btn-redo:not(:disabled):active{background:rgba(255,215,0,0.25);}
#btn-redo:disabled{opacity:0.3;cursor:default;}

/* MAIN — side by side */
#main{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0;}

/* LEFT — FLOOR (takes all remaining width) */
#panel-floor{display:flex;flex-direction:column;flex:1;min-width:0;border-right:2px solid var(--border);}
#flr-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;overflow:hidden;touch-action:none;}
#flr-clip{position:relative;overflow:hidden;flex-shrink:0;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,0.7);-webkit-transform:translateZ(0);transform:translateZ(0);}
#flr{position:relative;background:#191b1f;border-radius:10px;border:1.5px solid rgba(255,255,255,0.1);-webkit-transform:translateZ(0);transform:translateZ(0);}
.bg-zone{position:absolute;pointer-events:none;border-radius:4px;}
.zone-lbl{position:absolute;pointer-events:none;font-family:'IBM Plex Mono',monospace;font-weight:700;color:rgba(255,255,255,0.09);letter-spacing:2px;text-align:center;}
.tbl{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  border:2px solid rgba(0,0,0,0.2);overflow:hidden;-webkit-touch-callout:none;outline:none;}
.tbl.round{border-radius:50%;}.tbl.special{border-radius:50%;}.tbl.rect{border-radius:5px;}.tbl.booth{border-radius:6px;}
.tbl.empty{opacity:.36;}.tbl.seated{opacity:1;box-shadow:0 0 0 2.5px rgba(255,255,255,0.3);}
.tbl.pressing{opacity:.6;}
.tbl-n{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;line-height:1;opacity:.8;}
.tbl-p{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:700;line-height:1;}
.stl{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;border:1.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);
  color:rgba(255,255,255,0.3);}
.stl.occ{background:rgba(255,255,255,0.36);color:#fff;border-color:rgba(255,255,255,0.7);}
.stl.unassigned{opacity:.18;cursor:default;}
.stl:active{transform:scale(.87);}
#sbar{height:28px;min-height:28px;flex-shrink:0;background:var(--surf);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:14px;}
.st{font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace;}
.st strong{color:var(--text);}

/* NEXT-UP BANNER */
#next-banner{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:10px 16px;border-top:2px solid rgba(255,255,255,0.06);
  background:var(--surf);}
#next-banner-label{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;
  color:var(--dim);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
#next-banner-dot{width:18px;height:18px;border-radius:4px;flex-shrink:0;}
#next-banner-name{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;
  color:#fff;letter-spacing:1px;white-space:nowrap;}
/* RIGHT — ROTATION (fixed narrow column) */
#panel-rot{width:220px;min-width:220px;flex-shrink:0;display:flex;flex-direction:column;min-height:0;}
#rot-header{padding:6px 10px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;}
#rot-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px;}

/* server list */
#rot-scroll{flex:1;overflow-y:hidden;overflow-x:hidden;padding:2px 5px 2px;
  display:flex;flex-direction:column;gap:2px;}
#rot-scroll::-webkit-scrollbar{width:3px;}
#rot-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

.sec-row{border-radius:6px;padding:3px 5px;
  cursor:pointer;}
.sec-row:hover{background:rgba(255,255,255,0.04);}
.sec-row.next-up{background:rgba(255,215,0,0.07);outline:1.5px solid rgba(255,215,0,0.28);}
.sec-row.selected{outline:2px solid #fff !important;background:rgba(255,255,255,0.08) !important;}

@keyframes rowFlash{0%{background:rgba(255,215,0,0.35);}100%{background:transparent;}}
.sec-row.flash{animation:rowFlash 0.7s ease-out forwards;}

/* top line: badge + name */
.sec-row-top{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.sec-badge{width:26px;min-width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0;}
.sec-name-col{flex:1;min-width:0;overflow:hidden;}
.next-lbl{font-size:7px;color:var(--accent);font-weight:700;letter-spacing:.4px;line-height:1;display:block;}
.sel-lbl{font-size:7px;color:#fff;font-weight:700;letter-spacing:.4px;line-height:1;display:block;}
.sec-name-inp{font-size:14px;font-weight:600;color:var(--text);border:none;background:transparent;outline:none;
  border-bottom:1px dashed rgba(255,255,255,0.12);width:100%;padding:0;font-family:'IBM Plex Sans',sans-serif;cursor:text;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sec-name-inp:focus{border-bottom-color:var(--accent);}

/* bottom line: − score + */
.sec-row-bot{display:flex;align-items:center;gap:3px;}
.sec-score{flex:1;font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:700;text-align:center;}
.sec-adj-btn{flex:0 0 34px;height:30px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);color:var(--dim);font-size:18px;line-height:1;
  cursor:pointer;padding:0;font-family:'IBM Plex Mono',monospace;font-weight:700;}
.sec-adj-btn:active{background:rgba(255,255,255,0.14);}
.sec-row.on-break{opacity:1;background:rgba(255,165,0,0.07);outline:1.5px solid rgba(255,165,0,0.25);border-radius:6px;}
.sec-row.on-break .sec-badge{opacity:0.4;filter:grayscale(1);}
.sec-row.on-break .sec-name-inp{opacity:0.45;text-decoration:line-through;}
.sec-row.on-break .sec-score{opacity:0.35;}
.sec-row.on-break .sec-adj-btn{opacity:0.3;pointer-events:none;}
.break-btn{flex:0 0 26px;height:26px;border-radius:5px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);color:var(--dim);font-size:13px;line-height:1;
  cursor:pointer;padding:0;margin-left:2px;}
.break-btn.active{background:rgba(255,165,0,0.25);color:#FFA500;border-color:rgba(255,165,0,0.6);box-shadow:0 0 6px rgba(255,165,0,0.3);}

/* ACTION BAR */
#rot-actions{flex-shrink:0;background:var(--surf);border-top:1px solid var(--border);padding:7px 8px;display:flex;flex-direction:column;gap:5px;}
#action-context{font-size:11px;font-weight:600;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#action-context.next{color:var(--accent);}
#action-context.manual{color:#fff;}
#action-btns{display:flex;gap:7px;}
.act-btn{flex:1;padding:13px 4px;border-radius:10px;border:none;text-align:center;
  font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:700;cursor:pointer;transition:opacity .12s;line-height:1.2;}
.act-btn:active{transform:scale(.93);}
.act-lbl{font-size:9px;font-weight:400;opacity:.7;display:block;letter-spacing:.3px;margin-top:4px;}
.act-seat{background:rgba(255,215,0,0.15);color:var(--accent);border:1.5px solid rgba(255,215,0,0.4);}
.act-d{background:rgba(180,130,255,0.14);color:#b482ff;border:1.5px solid rgba(180,130,255,0.38);}

/* TABLE SEAT MODAL */
#confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:600;align-items:center;justify-content:center;}
#confirm-overlay.open{display:flex;}
#confirm-box{background:#17171f;border:1px solid rgba(255,255,255,0.11);border-radius:14px;padding:20px;width:min(280px,88vw);
  display:flex;flex-direction:column;gap:14px;align-items:center;}
#confirm-msg{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:#eee;text-align:center;line-height:1.5;}
#confirm-btns{display:flex;gap:10px;width:100%;}
#confirm-yes{flex:1;padding:12px;border-radius:9px;border:none;background:rgba(255,165,0,0.2);color:#FFA500;
  font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid rgba(255,165,0,0.4);}
#confirm-no{flex:1;padding:12px;border-radius:9px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);
  color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;cursor:pointer;}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
  z-index:500;align-items:center;justify-content:center;-webkit-overflow-scrolling:touch;}
#overlay.open{display:flex;}
#modal{background:#17171f;border:1px solid rgba(255,255,255,0.11);border-radius:16px;padding:22px;
  width:min(330px,92vw);box-shadow:0 28px 70px rgba(0,0,0,0.8);}
#m-hdr{display:flex;align-items:center;gap:10px;margin-bottom:3px;}
#m-title{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;}
#m-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
#m-srv{font-size:12px;color:var(--dim);margin-bottom:15px;}
.m-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);font-weight:600;margin-bottom:7px;}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:15px;}
.pb{padding:11px 0;border-radius:8px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
  color:#bbb;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .1s;}
.pb.rp{padding:6px 0;font-size:12px;min-width:32px;border-radius:6px;}
.pb.on{border-color:var(--accent);background:rgba(255,215,0,0.15);color:var(--accent);}
.pb:active{transform:scale(.9);}
.mbtns{display:flex;gap:7px;}
.mbtn-p{flex:1;padding:12px;border-radius:9px;border:none;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.mbtn-p:disabled{opacity:.28;cursor:not-allowed;}
.mbtn-p:not(:disabled):active{opacity:.8;}
.mbtn-d{padding:12px;border-radius:9px;border:1px solid rgba(255,80,80,0.3);background:rgba(255,80,80,0.09);
  color:#ff6060;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.mbtn-d:active{background:rgba(255,80,80,0.22);}
.mbtn-g{padding:12px;border-radius:9px;border:1px solid var(--border);background:transparent;
  color:var(--dim);font-family:'IBM Plex Sans',sans-serif;font-size:14px;cursor:pointer;}
</style>
</head>

    servers:     st.servers,
    names:       st.names,
    tables:      st.tables,
    movedPos:    st.movedPos,
    links:       Object.fromEntries(Object.entries(st.links).map(([k,v])=>[k,[...v]])),

    newServers:  [...st.newServers],
    onBreak:     [...st.onBreak],
    selectedSec: st.selectedSec ?? null
  };
}
// ── UNDO / REDO STACKS
const UNDO_STACK = [];
const REDO_STACK = [];
const UNDO_MAX = 20;

function snapshotState(){
  const snap = JSON.stringify(stateToObj());
  if(UNDO_STACK[UNDO_STACK.length-1] === snap) return;
  UNDO_STACK.push(snap);
  if(UNDO_STACK.length > UNDO_MAX) UNDO_STACK.shift();
  REDO_STACK.length = 0;
  updateUndoBtn();
}
function applySnap(snap){
  deserializeState(JSON.parse(snap));
  updateUndoBtn();
  renderOnly();
  pushToFirebase();
  saveLocal();
}
function undoState(){
  if(UNDO_STACK.length < 2) return;
  REDO_STACK.push(UNDO_STACK.pop()); // move current to redo
  applySnap(UNDO_STACK[UNDO_STACK.length-1]);
}
function redoState(){
  if(REDO_STACK.length === 0) return;
  const snap = REDO_STACK.pop();
  UNDO_STACK.push(snap);
  applySnap(snap);
}
function updateUndoBtn(){
  const u = document.getElementById('btn-undo');
  const r = document.getElementById('btn-redo');

// ── SHARED STATE DESERIALIZER
function deserializeState(data){
  st.servers     = data.servers     ?? st.servers;
  st.names       = data.names       ?? st.names;
  st.tables      = data.tables      ?? {};
  st.movedPos    = data.movedPos    ?? {};
  st.guestTotals = data.guestTotals ?? {};
  st.dailyTables = data.dailyTables ?? 0;
  st.dailyGuests = data.dailyGuests ?? 0;
  st.newServers  = new Set(data.newServers ?? []);
  st.onBreak     = new Set(data.onBreak    ?? []);
  st.selectedSec = data.selectedSec ?? null;
  st.links = {};
  for(const [k,v] of Object.entries(data.links ?? {})) st.links[+k] = new Set(v);
  const sc = document.getElementById('srv-count'); if(sc) sc.textContent = st.servers;
}
// ── LOCAL PERSISTENCE KEY
const LS_KEY = 'tt_shift_v1';

// ── HELPERS
function secOf(tid){
  for(const [s,arr] of Object.entries(L[st.servers]))
    if(arr.includes(+tid)) return +s;
  return null;
}
function rotSections(){ return Array.from({length:st.servers},(_,i)=>i+1); }
function secGuestScore(s){ return Math.round(st.guestTotals[s]||0); }
function stoolSecOf(sid){
  const n = st.servers;
  // layouts 2-4: all stools → section 2
  if(n <= 4) return 2;
  // layouts 5-7: 801-804 → section 5, 805-808 → section 2
  if(n <= 7) return (sid >= 801 && sid <= 804) ? 5 : 2;
  // layouts 8-11: 804-805 → section 8, 801-803 → section 5, 806-808 → section 2
  if(sid >= 806) return 2;
  if(sid >= 804) return 8;
  return 5;
}
function clearUnassignedStools(){
  for(const id of Object.keys(STOOL_POS)){
    const sid = +id;
    if(st.tables[sid] !== undefined && stoolSecOf(sid) === null){
      delete st.tables[sid];
    }
  }
}
function nextUp(){
  // Newly added servers jump to the front (priority overrides guest count)
  if(st.newServers.size > 0){
    let min=Infinity, best=null;
    for(const s of st.newServers){
      if(s > st.servers) continue;
      if(st.onBreak.has(s)) continue;
      const sc=secGuestScore(s); if(sc<min){min=sc;best=s;}
    }
    if(best !== null) return best;
  }
  // Lowest guest total is next up (skip on-break servers)
  let min=Infinity, best=null;
  for(let s=1;s<=st.servers;s++){
    if(st.onBreak.has(s)) continue;
    const sc=secGuestScore(s);if(sc<min){min=sc;best=s;}
  }
  return best;
}
// The section that will receive the next button press
function activeTarget(){ return st.selectedSec !== null ? st.selectedSec : nextUp(); }

// ── SELECTION
function selectSec(s){
  // Clicking the already-selected row deselects (back to auto)
  st.selectedSec = (st.selectedSec === s) ? null : s;
  updateActionContext();
  renderRot();
}
function updateActionContext(){
  const ctx = document.getElementById('action-context');
  if(st.selectedSec !== null){
    const c = FLOOR_C[st.selectedSec];
    const name = st.names[st.selectedSec]||`Server ${st.selectedSec}`;
    ctx.className = 'manual';
    ctx.innerHTML = `<span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${c.bg};margin-right:5px;vertical-align:middle;"></span>Logging to: <strong>${name}</strong> <span style="opacity:.45;font-weight:400;font-size:9px;">(tap row again to deselect)</span>`;
  } else {
    const n = nextUp();
    const c = n ? FLOOR_C[n] : null;
    const name = n ? (st.names[n]||`Server ${n}`) : '—';
    ctx.className = 'next';
    ctx.innerHTML = c
      ? `<span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${c.bg};margin-right:5px;vertical-align:middle;"></span>Next up: <strong>${name}</strong>`
      : 'Next up: —';
  }
}

// ── ROTATION RENDER
let rowEls = {};
function renderRot(){
  const wrap = document.getElementById('rot-scroll');
  wrap.innerHTML = '';
  rowEls = {};
  const secs = rotSections();
  const next = nextUp();

  for(const s of secs){
    const isNext = s === next && st.selectedSec === null;
    const isSel  = s === st.selectedSec;
    const col    = FLOOR_C[s];
    const name   = st.names[s]||`Server ${s}`;

    const isOnBreak = st.onBreak.has(s);
    const row = document.createElement('div');
    row.className = 'sec-row' + (isNext?' next-up':'') + (isSel?' selected':'') + (isOnBreak?' on-break':'');
    rowEls[s] = row;
    row.addEventListener('click', e => { if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON') return; selectSec(s); });

    // Top line: badge + name
    const rowTop = document.createElement('div');
    rowTop.className = 'sec-row-top';

    const badge = document.createElement('div');
    badge.className = 'sec-badge';
    badge.style.cssText = `background:${col.bg};color:${col.tx}`;
    badge.textContent = s;

    const nameCol = document.createElement('div');
    nameCol.className = 'sec-name-col';
    if(isSel){ const sl=document.createElement('div');sl.className='sel-lbl';sl.textContent='● SELECTED';nameCol.appendChild(sl); }
    else if(isOnBreak){ const bl=document.createElement('div');bl.className='next-lbl';bl.style.cssText='color:#FFA500;font-size:9px;letter-spacing:.5px;';bl.textContent='☕ ON BREAK';nameCol.appendChild(bl); }
    else if(st.newServers.has(s)){ const nl=document.createElement('div');nl.className='next-lbl';nl.textContent='★ NEW · NEXT UP';nameCol.appendChild(nl); }
    else if(isNext){ const nl=document.createElement('div');nl.className='next-lbl';nl.textContent='NEXT UP';nameCol.appendChild(nl); }
    const ni = document.createElement('input');
    ni.type='text'; ni.className='sec-name-inp'; ni.value=name; ni.maxLength=16; ni.dataset.s=s;
    ni.addEventListener('change', e => { st.names[+e.target.dataset.s]=e.target.value.trim()||name; updateActionContext(); renderBanner(); });
    ni.addEventListener('keydown', e => { if(e.key==='Enter') e.target.blur(); });
    nameCol.appendChild(ni);
    rowTop.appendChild(badge);
    rowTop.appendChild(nameCol);

    // Bottom line: − score +
    const rowBot = document.createElement('div');
    rowBot.className = 'sec-row-bot';

    const score = secGuestScore(s);
    const btnMinus = document.createElement('button');
    btnMinus.textContent = '−';
    btnMinus.className = 'sec-adj-btn';
    btnMinus.addEventListener('click', ev => { ev.stopPropagation(); st.guestTotals[s]=Math.max(0,(st.guestTotals[s]||0)-1); snapshotState(); renderRot(); });

    const scoreEl = document.createElement('div');
    scoreEl.className = 'sec-score';
    scoreEl.style.color = isSel?'#fff':isNext?'var(--accent)':score>0?'var(--text)':'var(--dim)';
    scoreEl.textContent = Math.round(score);

    const btnPlus = document.createElement('button');
    btnPlus.textContent = '+';
    btnPlus.className = 'sec-adj-btn';
    btnPlus.addEventListener('click', ev => { ev.stopPropagation(); st.guestTotals[s]=(st.guestTotals[s]||0)+1; snapshotState(); renderRot(); });

    rowBot.appendChild(btnMinus);
    rowBot.appendChild(scoreEl);
    rowBot.appendChild(btnPlus);

    const btnBreak = document.createElement('button');
    btnBreak.textContent = '☕';
    btnBreak.className = 'break-btn' + (isOnBreak ? ' active' : '');
    btnBreak.title = isOnBreak ? 'End break' : 'Mark on break';
    btnBreak.addEventListener('click', ev => {
      ev.stopPropagation();
      const name = st.names[s] || `Server ${s}`;
      const isBreak = st.onBreak.has(s);
      const msg = isBreak ? `Return ${name} from break?` : `Put ${name} on break?`;
      showConfirm(msg, ()=>{
        if(isBreak){
          st.onBreak.delete(s);
          const activeSecs = Array.from({length:st.servers},(_,i)=>i+1).filter(x=>!st.onBreak.has(x) && x!==s);
          if(activeSecs.length > 0){
            const avg = activeSecs.reduce((sum,x)=>sum+(st.guestTotals[x]||0),0) / activeSecs.length;
            st.guestTotals[s] = Math.round(avg);
          }
        } else {
          st.onBreak.add(s);
        }
        renderRot();
      });
    });
    rowBot.appendChild(btnBreak);

    row.appendChild(rowTop);
    row.appendChild(rowBot);
    wrap.appendChild(row);
  }

  updateActionContext();
  renderBanner();
}

// Log an event to the active target (selected or next-up)
function addEvent(type, guests){
  const s = activeTarget();
  if(!s) return;
  if(!st.guestTotals[s]) st.guestTotals[s] = 0;
  const g = guests || (type==='S' ? 1 : type==='D' ? 1 : 3);
  st.guestTotals[s] += g;
  if(type !== 'D'){ st.dailyGuests += g; }
  st.dailyTables++;
  st.newServers.delete(s);
  st.selectedSec = null;
  snapshotState();
  renderRot();
}

// Auto-log from floor seating to a specific section
function addEventToSec(sec, type, guests){
  if(!st.guestTotals[sec]) st.guestTotals[sec] = 0;
  const g = guests || (type==='S' ? 1 : type==='D' ? 1 : 3);
  st.guestTotals[sec] += g;
  // Daily totals
  if(type !== 'D'){ st.dailyGuests += g; }
  st.dailyTables++;
  st.newServers.delete(sec);
  renderRot();
  const row = rowEls[sec];
  if(row){
    row.classList.remove('flash');
    void row.offsetWidth;
    row.classList.add('flash');
    setTimeout(() => row.classList.remove('flash'), 800);
  }
}

}

// iOS-compatible color helpers (replaces color-mix which needs Safari 16.2+)
function darkenHex(hex, amt=0.7){
  const h=hex.replace('#',''), r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return `rgb(${Math.round(r*amt)},${Math.round(g*amt)},${Math.round(b*amt)})`;
}
function tintSurf(hex, amt=0.1){
  const h=hex.replace('#',''), r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return `rgb(${Math.round(r*amt+22*(1-amt))},${Math.round(g*amt+22*(1-amt))},${Math.round(b*amt+26*(1-amt))})`;
}

function unlinkTable(id){
  const linked = st.links[id];
  if(linked){ for(const lid of linked){ if(st.links[lid]) st.links[lid].delete(id); if(st.links[lid]&&st.links[lid].size===0) delete st.links[lid]; } }
  delete st.links[id];
}
function linkTables(a,b){
  if(!st.links[a]) st.links[a]=new Set();
  if(!st.links[b]) st.links[b]=new Set();
  st.links[a].add(b); st.links[b].add(a);
}
function getLinkedGroup(id){
  // BFS to find all tables in the same connected group
  const visited=new Set([id]), queue=[id];
  while(queue.length){ const cur=queue.shift(); for(const n of (st.links[cur]||[])){ if(!visited.has(n)){visited.add(n);queue.push(n);} } }
  return visited;
}
function snapDrop(dragId, dropL, dropT){
  const dragPos = T[dragId]; if(!dragPos) return {l:dropL,t:dropT,linkId:null};
  const SNAP = 14; let best=null, bestDist=Infinity;
  const dragCX = dropL+dragPos.w/2, dragCY = dropT+dragPos.h/2;
  const BOOTH_SHAPES = new Set(['booth','booth-h','booth-top2','booth-top1','booth-bot2','corner-booth','corner-booth-ccw']);
  for(const [idStr,pos] of Object.entries(T)){
    const tid=+idStr; if(tid===dragId) continue;
    if(BOOTH_SHAPES.has(pos.s)) continue; // booths cannot be linked to
    const tl = st.movedPos[tid]?.l??pos.l, tt = st.movedPos[tid]?.t??pos.t;
    const cx=tl+pos.w/2, cy=tt+pos.h/2;
    const dist=Math.hypot(cx-dragCX,cy-dragCY);
    if(dist<SNAP&&dist<bestDist){bestDist=dist;best={id:tid,l:tl,t:tt,w:pos.w,h:pos.h};}
  }
  if(!best) return {l:dropL,t:dropT,linkId:null};
  const dx=dragCX-best.l-best.w/2, dy=dragCY-best.t-best.h/2;
  // Only snap horizontally (left/right), not vertically
  if(Math.abs(dx) <= Math.abs(dy)) return {l:dropL,t:dropT,linkId:null};
  const sl = dx>0 ? best.l+best.w+0.3 : best.l-dragPos.w-0.3;
  const st2 = best.t+(best.h-dragPos.h)/2;
  return {l:sl,t:st2,linkId:best.id};
}

// ── INTERACTION: tap + long-press-clear + drag-to-link (tables only)
function addTableEvents(el, id, onTap){
  let isDragging=false;
  let startX, startY, ghost=null, ghostW, ghostH;
  let activePointerId=null;
  const THRESH=10;

  const draggable = T[id]?.s === 'rect-v' || T[id]?.s === 'rect-v4';
  const hOnly = id === 11 || id === 12 || id === 13 || id === 14 || id === 15;
  const isDraggable = draggable || hOnly;

  if(!isDraggable){
    let _tapPid = null;
    el.addEventListener('pointerdown', e=>{
      if(document.getElementById('overlay').classList.contains('open')) return;
      if(st._modalCooldown) return;
      _tapPid = e.pointerId;
      el.setPointerCapture(e.pointerId);
      el.classList.add('pressing');
    });
    el.addEventListener('pointerup', e=>{
      el.classList.remove('pressing');
      if(e.pointerId !== _tapPid) return;
      _tapPid = null;
      if(document.getElementById('overlay').classList.contains('open')) return;
      if(st._modalCooldown) return;
      onTap();
    });
    el.addEventListener('pointercancel', e=>{ el.classList.remove('pressing'); _tapPid = null; });
    el.addEventListener('contextmenu', e=>e.preventDefault());
    return;
  }

  el.addEventListener('pointerdown', e=>{
    if(document.getElementById('overlay').classList.contains('open')) return;
    if(st._modalCooldown) return;
    e.stopPropagation();
    isDragging=false;
    activePointerId=e.pointerId;
    startX=e.clientX; startY=e.clientY;
    el.setPointerCapture(e.pointerId);
    _capturedEl=el; _capturedPid=e.pointerId;
    el.classList.add('pressing');
  });

  el.addEventListener('pointermove', e=>{
    if(e.pointerId!==activePointerId) return;
    const moved=Math.hypot(e.clientX-startX,e.clientY-startY);
    if(!isDragging && moved>THRESH){
      isDragging=true;
      const r=el.getBoundingClientRect();
      ghostW=r.width; ghostH=r.height;
      ghost=el.cloneNode(true);
      ghost.style.cssText+=`;position:fixed;pointer-events:none;opacity:0.75;z-index:9999;width:${ghostW}px;height:${ghostH}px;transition:none;`;
      document.body.appendChild(ghost);
      el.style.opacity='0.2';
    }
    if(isDragging&&ghost){
      ghost.style.left=(e.clientX-ghostW/2)+'px';
      ghost.style.top=(hOnly ? el.getBoundingClientRect().top : e.clientY-ghostH/2)+'px';
    }
  });

  el.addEventListener('pointerup', e=>{
    if(e.pointerId!==activePointerId) return;
    activePointerId=null;
    el.style.opacity=''; el.style.filter='';
    el.classList.remove('pressing');
    if(ghost){ghost.remove();ghost=null;}
    try{el.releasePointerCapture(e.pointerId);}catch(_){}
    _capturedEl=null; _capturedPid=null;
    if(st._modalCooldown){isDragging=false;return;}
    if(isDragging){
      const flrEl=document.getElementById('flr');
      const rect=flrEl.getBoundingClientRect();
      const pos=T[id];
      const rawL=((e.clientX-rect.left)/rect.width*100)-pos.w/2;
      const rawT=((e.clientY-rect.top)/rect.height*100)-pos.h/2;
      const clampL=Math.max(0,Math.min(100-pos.w,rawL));
      const clampT=hOnly ? pos.t : Math.max(0,Math.min(100-pos.h,rawT));
      unlinkTable(id);
      const {l,t,linkId}=snapDrop(id,clampL,clampT);
      const actuallyMoved = Math.abs(l-(T[id].l))>0.5 || Math.abs(t-(T[id].t))>0.5;
      if(actuallyMoved) st.movedPos[id]={l,t};
      else delete st.movedPos[id];
      if(linkId) linkTables(id,linkId);
      isDragging=false;
      if(actuallyMoved || linkId){
        snapshotState();
        renderFloor(); renderStatus();
      } else {
        // Tiny accidental drag — treat as a clean tap, no snapshot, no re-render
        onTap();
      }
    } else {
      onTap();
    }
    isDragging=false;
  });

  el.addEventListener('pointercancel', e=>{
    if(e.pointerId!==activePointerId) return;
    activePointerId=null;
    isDragging=false;
    el.style.opacity='';
    el.classList.remove('pressing');
    if(ghost){ghost.remove();ghost=null;}
    _capturedEl=null; _capturedPid=null;
  });

  el.addEventListener('contextmenu',e=>e.preventDefault());
}

// ── STOOL: long press to clear (no drag)
function addLongPress(el, id, onTap){
  let timer=null,didLong=false;
  el.addEventListener('pointerdown',e=>{ didLong=false; timer=setTimeout(()=>{ didLong=true; if(st.tables[id]!==undefined){delete st.tables[id];renderFloor();renderStatus();} },600); });
  el.addEventListener('pointerup',e=>{ clearTimeout(timer); if(!didLong) onTap(); });
  el.addEventListener('pointerleave',()=>clearTimeout(timer));
  el.addEventListener('contextmenu',e=>e.preventDefault());
}
function renderStatus(){
  const tableIds  = Object.keys(T).map(Number);
  const stoolIds  = Object.keys(STOOL_POS).map(Number);
  const allIds    = [...tableIds, ...stoolIds];
  const seated    = allIds.filter(id => st.tables[id] !== undefined).length;
  const guests    = allIds.reduce((s,id)=>s+(st.tables[id]?.party||0),0);
  const open      = tableIds.filter(id => st.tables[id] === undefined).length;
  document.getElementById('ss').textContent=seated;
  document.getElementById('sg').textContent=guests;
  document.getElementById('so').textContent=open;
  // Right-side totals: count unique seated groups and their total guests
  // Each linked group counts as 1 table
  const seenGroups = new Set();
  let totalTables=0, totalGuests=0;
  for(const id of allIds){
    if(st.tables[id]===undefined) continue;
    const group = st.links[id] && st.links[id].size>0 ? getLinkedGroup(id) : new Set([id]);
    const groupKey = [...group].sort((a,b)=>a-b).join(',');
    if(seenGroups.has(groupKey)) continue;
    seenGroups.add(groupKey);
    totalTables++;
    const party = [...group].map(gid=>st.tables[gid]?.party||0).find(p=>p>0)||0;
    totalGuests += party;
  }
  document.getElementById('total-tables').textContent=st.dailyTables;
  document.getElementById('total-guests').textContent=st.dailyGuests;
}

// ── SEAT MODAL
function openModal(id){
  const group = getLinkedGroup(id);
  st.mTable = id;
  st.mGroup = group;

  // Group tables by section
  const secMap = new Map(); // sec -> [tableIds]
  for(const gid of group){
    const s = secOf(gid);
    if(!s) continue;
    if(!secMap.has(s)) secMap.set(s,[]);
    secMap.get(s).push(gid);
  }
  const sections = [...secMap.entries()]; // [{sec, ids}]

  // If group spans multiple sections, use stepped flow
  if(sections.length > 1){
    const anySeated = [...group].some(gid=>st.tables[gid]!==undefined);
    if(!anySeated){
      // Fresh seating — step through each server
      st.mMultiSec = sections.map(([s,ids])=>({s,ids,party:null}));
      st.mMultiStep = 0;
      openModalStep();
      return;
    }
    // Already seated — treat as single group for update/clear
  }

  // Single-section or already-seated group — existing flow
  st.mMultiSec = null;
  st.mOverrideSec = null;
  const s = secOf(id), c = FLOOR_C[s];
  const anySeated = [...group].some(gid => st.tables[gid] !== undefined);

  // If server is on break and table not yet seated, prompt for reassignment
  if(st.onBreak.has(s) && !anySeated){
    openBreakReassignModal(id, group, s);
    return;
  }
  const existingParty = [...group].map(gid => st.tables[gid]?.party).find(p => p !== undefined) ?? null;
  st.mParty = existingParty;

  const title = group.size > 1 ? `Tables ${[...group].sort((a,b)=>a-b).join('+')}` : `Table ${id}`;
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-title').style.color = c.bg;
  const badge=document.getElementById('m-badge');
  badge.textContent=`§${s}`;
  badge.style.cssText=`background:${c.bg};color:${c.tx};font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;`;
  document.getElementById('m-srv').textContent=st.names[s]||`Server ${s}`;
  document.querySelectorAll('.pb').forEach(b=>b.classList.toggle('on', +b.dataset.n === st.mParty && st.mParty !== null));
  const btns=document.getElementById('mbtns');
  const hasMoved = [...group].some(gid => st.movedPos[gid]);
  if(anySeated){
    btns.innerHTML=`<button class="mbtn-p" id="mb-go" style="background:${c.bg};color:${c.tx}">Update</button>
      <button class="mbtn-d" id="mb-cl">Clear</button>
      ${hasMoved?`<button class="mbtn-g" id="mb-ret" style="font-size:11px;">↩</button>`:''}
      <button class="mbtn-g" id="mb-cx">✕</button>`;
  } else {
    btns.innerHTML=`<button class="mbtn-p" id="mb-go" style="background:${c.bg};color:${c.tx}" disabled>Seat</button>
      ${hasMoved?`<button class="mbtn-g" id="mb-ret" style="font-size:11px;">↩ Reset Position</button>`:''}
      <button class="mbtn-g" id="mb-cx">Cancel</button>`;
  }
  document.getElementById('mb-go').addEventListener('click', doSeat);
  document.getElementById('mb-cx').addEventListener('click', closeModal);
  const clr=document.getElementById('mb-cl'); if(clr) clr.addEventListener('click', doClear);
  const ret=document.getElementById('mb-ret');
  if(ret) ret.addEventListener('click', ()=>{
    for(const gid of group){ delete st.movedPos[gid]; unlinkTable(gid); }
    closeModal(); renderFloor(); renderStatus();
  });

  // Timer
  clearInterval(st._timerInterval);
  const timerEl = document.getElementById('m-timer');
  const seatedAt = [...group].map(gid=>st.tables[gid]?.seatedAt).find(t=>t);
  if(seatedAt && anySeated){
    timerEl.style.cssText='display:block;font-family:\'IBM Plex Mono\',monospace;font-size:22px;font-weight:700;text-align:center;margin-bottom:14px;letter-spacing:2px;color:'+c.bg;
    function fmtTime(ms){ const tot=Math.floor(ms/1000),m=Math.floor(tot/60),h=Math.floor(m/60);
      return h>0?`${h}:${String(m%60).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`:
                 `${String(m).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`; }
    timerEl.textContent=fmtTime(Date.now()-seatedAt);
    st._timerInterval=setInterval(()=>{ timerEl.textContent=fmtTime(Date.now()-seatedAt); },1000);
  } else {
    timerEl.style.display='none';
  }

  document.getElementById('overlay').classList.add('open');
}

  const hasMoved = st.mGroup && [...st.mGroup].some(gid=>st.movedPos[gid]);
  document.getElementById('mbtns').innerHTML =
    `${hasMoved?`<button class="mbtn-g" id="mb-ret" style="font-size:11px;">↩ Reset Position</button>`:''}
     <button class="mbtn-g" id="mb-cx">Cancel</button>`;

  // No Next button — auto-advances on party size tap
  if(hasMoved){
    document.getElementById('mb-ret').addEventListener('click', ()=>{
      for(const gid of st.mGroup){ delete st.movedPos[gid]; unlinkTable(gid); }
      closeModal(); renderFloor(); renderStatus();
    });
  }
  document.getElementById('mb-cx').addEventListener('click', closeModal);

  document.getElementById('overlay').classList.add('open');
}

// Shared seating logic — seats a table/stool by ID with a given party size
// secOverride lets stools pass their section since they aren't in the T layout map
function doSeatTable(id, party, secOverride){
  const prevParty = st.tables[id]?.party || null;
  const prevSeatedAt = st.tables[id]?.seatedAt || null;
  const s = secOverride || secOf(id);
  st.tables[id] = {party, seatedAt: prevParty ? prevSeatedAt : Date.now(), sec: s};
  if(s && party !== 0){
    if(!prevParty){
      const type = party===1 ? 'S' : party>=5 ? 'XL' : 'X';
      addEventToSec(s, type, party);
    } else if(prevParty !== 0 && prevParty !== party){
      if(!st.guestTotals[s]) st.guestTotals[s] = 0;
      st.guestTotals[s] += (party - prevParty);
      renderRot();
    }
  }
  renderFloor(); renderStatus();
}

function clearAllPressing(){
  document.querySelectorAll('.pressing').forEach(el=>el.classList.remove('pressing'));
}

function closeModal(){
  clearInterval(st._timerInterval);
  document.getElementById('overlay').classList.remove('open');
  st.mTable=null; st.mParty=null; st.mGroup=null; st.mMultiSec=null; st.mMultiStep=0; st.mOverrideSec=null; st.rotMode=false;
  releaseAnyCapture();
  clearAllPressing();
  if(document.activeElement) document.activeElement.blur();
  // Clean up break picker if present
  const bp = document.getElementById('break-picker'); if(bp) bp.remove();
  const pg = document.querySelector('.pgrid'); if(pg) pg.style.display='';
  const ml = document.querySelector('.m-lbl'); if(ml) ml.textContent='Party Size';
  st._modalCooldown = true;
  setTimeout(()=>{ st._modalCooldown = false; }, 300);
  renderFloor();
}

function doSeat(){
  if(st.mParty === null) return;
  const group = st.mGroup || new Set([st.mTable]);
  const isStool = STOOL_POS[st.mTable];
  if(isStool){
    const stoolSec = stoolSecOf(st.mTable);
    doSeatTable(st.mTable, st.mParty, stoolSec);
  } else {
    // For a group, seat all members but only log rotation once (for the primary table)
    const ids = [...group].sort((a,b)=>a-b);
    const primary = ids[0];
    const prevParty = [...group].map(gid=>st.tables[gid]?.party).find(p=>p!==undefined)??null;
    // Set all members to same party
    const prevSeatedAt = [...group].map(g=>st.tables[g]?.seatedAt).find(t=>t) || Date.now();
    for(const gid of ids) st.tables[gid] = {party: st.mParty, seatedAt: prevParty ? prevSeatedAt : Date.now(), sec: st.mOverrideSec || secOf(gid), ...(st.mOverrideSec ? {coverageSec: st.mOverrideSec} : {})};
    // Log rotation once — skip if "In Use" (party === 0)
    const s = st.mOverrideSec || secOf(primary);
    if(s && st.mParty !== 0 && !prevParty){
      const type = st.mParty===1 ? 'S' : st.mParty>=5 ? 'XL' : 'X';
      addEventToSec(s, type, st.mParty);
    } else if(s && st.mParty !== 0 && prevParty && prevParty !== 0 && prevParty !== st.mParty){
      if(!st.guestTotals[s]) st.guestTotals[s]=0;
      st.guestTotals[s] += (st.mParty - prevParty);
      renderRot();
    }
    renderFloor(); renderStatus();
  }
  snapshotState();
  closeModal();
}

function doClear(){
  const group = st.mGroup || new Set([st.mTable]);
  for(const gid of group){
    delete st.tables[gid];
    delete st.movedPos[gid];
  }
  for(const gid of group) unlinkTable(gid);
  snapshotState();
  closeModal(); renderFloor(); renderStatus();
}

document.querySelectorAll('.pb').forEach(b=>{
  b.addEventListener('click',()=>{
    st.mParty = b.dataset.n === '' ? null : +b.dataset.n;
    document.querySelectorAll('.pb').forEach(x=>x.classList.toggle('on', +x.dataset.n===st.mParty && st.mParty!==null));

    // Multi-step mode: save selection and auto-advance
    if(st.mMultiSec){
      st.mMultiSec[st.mMultiStep].party = st.mParty;
      const isLast = st.mMultiStep === st.mMultiSec.length - 1;
      if(!isLast){
        st.mMultiStep++;
        openModalStep();
      } else {
        // All steps done — seat each group
        const now = Date.now();
        for(const entry of st.mMultiSec){
          if(entry.party === null) continue;
          for(const gid of entry.ids) st.tables[gid] = {party: entry.party, seatedAt: now, sec: entry.s};
          if(entry.party !== 0){
            const type = entry.party===1?'S':entry.party>=5?'XL':'X';
            addEventToSec(entry.s, type, entry.party);
          }
        }
        snapshotState();
        closeModal(); renderFloor(); renderStatus();
      }
      return;
    }

    if(st.rotMode && st.mParty !== null){
      const n = st.mParty;
      const type = n===1 ? 'S' : n>=5 ? 'XL' : 'X';
      addEvent(type, n);
      closeModal();
    } else if(!st.rotMode){
      const group = st.mGroup || new Set([st.mTable]);
      const anySeated = [...group].some(gid => st.tables[gid] !== undefined);
      if(!anySeated && st.mParty !== null){
        if(STOOL_POS[st.mTable]){
          doSeatTable(st.mTable, st.mParty, stoolSecOf(st.mTable));
        } else {
          doSeat();
          return;
        }
        closeModal();
      } else {
        const gb=document.getElementById('mb-go'); if(gb) gb.disabled=false;
      }
    }
  });
});

document.getElementById('act-seat').addEventListener('click', openRotModal);
document.getElementById('act-d').addEventListener('click', ()=>{ addEvent('D', 1); });

function applyServerCount(newCount){
  newCount = Math.max(2, Math.min(11, newCount));
  if(newCount === st.servers) return;
  const oldCount = st.servers;

  if(newCount < oldCount){
    for(let s = newCount+1; s <= oldCount; s++){
      if(st.events) delete st.events[s];
      // Keep guestTotals so they're restored if servers are added back
      st.newServers.delete(s);
      st.onBreak.delete(s);
    }
    for(const [tid] of Object.entries(st.tables)){
      let found = false;
      for(let s=1; s<=newCount; s++){
        if((L[newCount][s]||[]).includes(+tid)){ found=true; break; }
      }
      if(!found) delete st.tables[tid];
    }
    if(st.selectedSec > newCount) st.selectedSec = null;
  } else if(newCount > oldCount){
    for(let s = oldCount+1; s <= newCount; s++){
      // Always set to average of currently active servers
      let totalGuests = 0;
      for(let x=1; x<=oldCount; x++) totalGuests += secGuestScore(x);
      st.guestTotals[s] = oldCount > 0 ? Math.round(totalGuests / oldCount) : 0;
      if(st.events && !st.events[s]) st.events[s] = [];
      st.newServers.add(s);
    }
  }

  st.servers = newCount;
  st.selectedSec = null;
  document.getElementById('srv-count').textContent = newCount;
  clearUnassignedStools();
  renderAll();
}

document.getElementById('srv-dec').addEventListener('click', ()=> applyServerCount(st.servers - 1));
document.getElementById('srv-inc').addEventListener('click', ()=> applyServerCount(st.servers + 1));
document.getElementById('btn-undo').addEventListener('click', ()=>{ undoState(); });

document.getElementById('btn-clr').addEventListener('click',()=>{

document.getElementById('overlay').addEventListener('click', e=>{

});
// Debounced resize — avoids layout thrash on iPad orientation change
let _resizeTimer;
window.addEventListener('resize', ()=>{ clearTimeout(_resizeTimer); _resizeTimer=setTimeout(renderFloor,150); });

// Prevent pull-to-refresh / scroll bounce on floor and rotation panel
document.addEventListener('touchmove', e=>{
  if(e.target.closest('#flr-wrap,#panel-rot')) e.preventDefault();
}, {passive:false});
// Clear any stuck pointer/active state when touching outside a table
document.addEventListener('pointerup', ()=>{

});

function renderBanner(){
  const dot    = document.getElementById('next-banner-dot');
  const nameEl = document.getElementById('next-banner-name');
  const banner = document.getElementById('next-banner');
  const upcoming = document.getElementById('next-banner-upcoming');

  // Find next 3 in rotation order, excluding on-break servers
  const secs = Array.from({length:st.servers},(_,i)=>i+1).filter(s=>!st.onBreak.has(s));
  const sorted = [...secs].sort((a,b)=>secGuestScore(a)-secGuestScore(b));
  // Respect new-server priority
  const newArr = sorted.filter(s=>st.newServers.has(s));
  const rest   = sorted.filter(s=>!st.newServers.has(s));
  const ordered = [...newArr, ...rest];

  const next = ordered[0] || null;
  const next2 = ordered[1] || null;
  const next3 = ordered[2] || null;

  if(!next){
    dot.style.cssText='width:18px;height:18px;border-radius:4px;flex-shrink:0;background:transparent;';
    nameEl.textContent='—'; nameEl.style.color='var(--dim)';
    banner.style.background='var(--surf)';
    upcoming.innerHTML='';
    return;
  }

  const c = FLOOR_C[next];
  dot.style.cssText=`width:18px;height:18px;border-radius:4px;flex-shrink:0;background:${c.bg};`;
  nameEl.textContent = st.names[next]||`Server ${next}`;
  nameEl.style.color = c.bg;
  banner.style.background = tintSurf(c.bg);

  // Upcoming dots
  upcoming.innerHTML='';
  for(const s of [next2, next3]){
    if(!s) continue;
    const sc = FLOOR_C[s];
    const wrap = document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:2px;';
    const d = document.createElement('div');
    d.style.cssText=`width:14px;height:14px;border-radius:3px;background:${sc.bg};`;
    const lbl = document.createElement('div');
    lbl.style.cssText=`font-size:8px;font-family:'IBM Plex Mono',monospace;color:${sc.bg};font-weight:700;`;
    lbl.textContent = st.names[s]||`§${s}`;
    wrap.appendChild(d);
    wrap.appendChild(lbl);
    upcoming.appendChild(wrap);
  }
}

function renderOnly(){
  renderFloor(); renderStatus(); renderRot(); renderBanner();
}
function renderAll(){
  renderOnly();
  pushToFirebase();
  saveLocal();
}

  const screen = document.getElementById('login-screen');
  const input  = document.getElementById('login-input');
  const btn    = document.getElementById('login-btn');
  const err    = document.getElementById('login-error');
  const SESSION_KEY = 'tt_auth_v1';

  function unlock(){
    screen.style.display = 'none';
    sessionStorage.setItem(SESSION_KEY, '1');
    input.value = '';
  }

  function tryLogin(){
    if(input.value === '2047'){
      unlock();
    } else {
      err.textContent = 'Incorrect password';
      input.value = '';
      input.focus();
      setTimeout(()=>{ err.textContent=''; }, 2000);
    }
  }

  // Already authenticated this session
  if(sessionStorage.getItem(SESSION_KEY) === '1'){
    screen.style.display = 'none';
  } else {
    setTimeout(()=>input.focus(), 300);
  }

  btn.addEventListener('click', tryLogin);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
})();

function saveLocal(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(stateToObj()));
  } catch(e){}
}

function loadLocal(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    deserializeState(data);
  } catch(e){}
}

// Restore from localStorage instantly, then Firebase will sync on top
loadLocal();
renderAll();
snapshotState(); // seed the undo stack with the initial state


// ── FIREBASE SYNC (REST API — no SDK required) ──────────────
const FB_URL = 'https://table-tracker-e9afa-default-rtdb.europe-west1.firebasedatabase.app/shift';


// Deserialize Firebase data into local state and re-render
function dbToState(data){
  if(!data) return;
  try{
    _fbSyncing = true;
    deserializeState(data);
    _fbSyncing = false;
    saveLocal();
    renderOnly();
  } catch(e){
    _fbSyncing = false;
    console.error('[FB] dbToState error:', e);
  }
}

// Write state to Firebase using REST PUT
pushToFirebase = function(){
  if(_fbSyncing || !_fbReady) return;
  clearTimeout(_fbPushTimer);
  _fbPushTimer = setTimeout(()=>{
    fetch(FB_URL + '.json', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(stateToObj())
    })
    .then(r => { setSyncDot(r.ok); })
    .catch(()=> setSyncDot(false));
  }, 300);
};

// Sync indicator dot
const syncDot = document.createElement('div');
syncDot.style.cssText = 'width:8px;height:8px;border-radius:50%;background:#888;flex-shrink:0;margin-left:4px;';
document.getElementById('hdr').appendChild(syncDot);
function setSyncDot(ok){
  syncDot.style.background = ok ? '#3FBD5A' : '#E84040';
  syncDot.title = ok ? 'Synced' : 'Offline';
}

// Listen for changes by polling Firebase every 2 seconds
let _lastPollData = null;
async function poll(){
  try{
    const res = await fetch(FB_URL + '.json');
    if(res.ok){
      const data = await res.json();
      setSyncDot(true);
      const asStr = JSON.stringify(data);
      if(asStr !== _lastPollData){
        _lastPollData = asStr;
        if(!_fbSyncing) dbToState(data);
      }
      _fbReady = true; // allow writes only after first successful read
    } else {
      setSyncDot(false);
    }
  } catch(e){
    setSyncDot(false);
  }
  setTimeout(poll, 2000);
}
poll();
